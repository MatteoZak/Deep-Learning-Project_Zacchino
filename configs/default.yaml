env:
  phases:
    - gravity: -5.0
      wind_power: 0.0
      turbulence_power: 0.0
    - gravity: -8.0
      wind_power: 10.0
      turbulence_power: 0.5
    - gravity: -10.0
      wind_power: 15.0
      turbulence_power: 1.5

scheduler:
  threshold:
    reward_thresholds: [50, 180]
    window: 50
  threshold_retreat:
    reward_thresholds: [50, 180]
    window: 50
    retreat_window: 30
    retreat_ratio: 0.75
  entropy:
    entropy_thresholds: [0.6, 0.4]
    window: 50
  td_error:
    td_error_thresholds: [0.8, 0.5]
    window: 50
  success_rate:
    advance_thresholds: [0.30, 0.50]
    retreat_thresholds: [0.10, 0.20]
    window: 50
    retreat_window: 20
    ema_alpha: 0.10
    success_threshold: 200.0

  pcer:
    ent_coef_schedule: [0.10, 0.05, 0.02]
    reward_thresholds: [50, 180]
    window: 50
  pcer_high:
    ent_coef_schedule: [0.20, 0.10, 0.02]
    reward_thresholds: [50, 180]
    window: 50
  pcer_low:
    ent_coef_schedule: [0.05, 0.02, 0.01]
    reward_thresholds: [50, 180]
    window: 50
  pcer_flat:
    ent_coef_schedule: [0.05, 0.05, 0.05]
    reward_thresholds: [50, 180]
    window: 50
  pcer_flat_low:
    ent_coef_schedule: [0.02, 0.02, 0.02]
    reward_thresholds: [50, 180]
    window: 50

  threshold_3phase:
    reward_thresholds: [50, 120]
    window: 50
  threshold_retreat_3phase:
    reward_thresholds: [50, 120]
    window: 50
    retreat_window: 30
    retreat_ratio: 0.75
  pcer_3phase:
    ent_coef_schedule: [0.10, 0.05, 0.02]
    reward_thresholds: [50, 120]
    window: 50
  pcer_flat_low_3phase:
    ent_coef_schedule: [0.02, 0.02, 0.02]
    reward_thresholds: [50, 120]
    window: 50

  continuous:
    reward_min: -100.0
    reward_max: 200.0
    ema_alpha: 0.05

ppo:
  total_timesteps: 3000000
  n_steps: 4096
  batch_size: 128
  n_epochs: 10
  learning_rate: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  clip_range_final: 0.1
  ent_coef: 0.05
  device: auto

training:
  seeds: [0, 1, 2]
  log_dir: runs/
  checkpoint_dir: checkpoints/
